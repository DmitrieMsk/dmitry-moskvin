<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      ;(function () {
        var params = new URLSearchParams(window.location.search)
        var p = params.get('p')
        if (p) {
          var q = params.get('q')
          var h = params.get('h')
          params.delete('p')
          params.delete('q')
          params.delete('h')
          var rest = params.toString()
          if (!p.startsWith('/')) p = '/' + p
          p = p.replace(/^\/+/, '/')
          var basePath = window.location.pathname.replace(/\/+$/, '')
          var query = q ? '?' + q : rest ? '?' + rest : ''
          var hash = h ? '#' + h : ''
          var newUrl = basePath + p + query + hash
          window.history.replaceState(null, '', newUrl)
        }
      })()
    </script>
    <title>dmitry-moskvin</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
