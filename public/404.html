<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting...</title>
    <script>
      ;(function () {
        var l = window.location
        var repo = '/dmitry-moskvin'
        if (l.pathname.startsWith(repo + '/')) {
          var path = l.pathname.slice(repo.length)
          var newUrl = l.protocol + '//' + l.host + repo + '/?p=' + encodeURIComponent(path + l.search + l.hash)
          l.replace(newUrl)
        }
      })()
    </script>
  </head>
  <body></body>
</html>
